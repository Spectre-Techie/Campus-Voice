<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Megaphone body -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Megaphone cone -->
    <path d="M-40,-80 L80,-40 L80,40 L-40,80 Z" fill="white" fill-opacity="0.15" stroke="white"/>
    <!-- Speaker lines -->
    <line x1="110" y1="-30" x2="140" y2="-50"/>
    <line x1="110" y1="0" x2="150" y2="0"/>
    <line x1="110" y1="30" x2="140" y2="50"/>
    <!-- Handle -->
    <path d="M-40,30 L-40,90 Q-40,110 -20,110 L10,110 Q30,110 30,90 L30,60"/>
  </g>
</svg>
